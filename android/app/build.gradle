plugins {
    id "com.android.application"
    id "kotlin-android"
    // Flutter Gradle Plugin must be applied AFTER android & kotlin
    id "dev.flutter.flutter-gradle-plugin"
}

// ---------------------------------------------------------------------------
// Read version from pubspec.yaml (single source of truth) — falls back gracefully
// pubspec format:  version: 2.0.0+2   ->  versionName=2.0.0  versionCode=2
// ---------------------------------------------------------------------------
def pubspec = file("../../pubspec.yaml").text
def vMatch = (pubspec =~ /(?m)^version:\s*([^\s+]+)\+(\d+)/)
def appVersionName = vMatch ? vMatch[0][1] : "1.0.0"
def appVersionCode = vMatch ? vMatch[0][2].toInteger() : 1

// ---------------------------------------------------------------------------
// Signing — release uses key.properties if present, otherwise falls back to debug
// key.properties layout:
//   storeFile=/abs/path/upload-keystore.jks
//   storePassword=...
//   keyAlias=...
//   keyPassword=...
// ---------------------------------------------------------------------------
def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file("../key.properties")
def hasReleaseSigning = false
if (keystorePropertiesFile.exists() && keystorePropertiesFile.length() > 0) {
    keystorePropertiesFile.withReader("UTF-8") { keystoreProperties.load(it) }
    hasReleaseSigning = keystoreProperties.getProperty("storeFile") != null
}

android {
    namespace = "com.omniide.omni_ide"
    compileSdk = 36
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_17.toString()
    }

    sourceSets {
        main.java.srcDirs += "src/main/kotlin"
    }

    defaultConfig {
        applicationId = "com.omniide.omni_ide"
        minSdk = 21
        targetSdk = 35
        versionCode = appVersionCode
        versionName = appVersionName

        // Multi-arch support
        ndk {
            abiFilters "armeabi-v7a", "arm64-v8a", "x86_64"
        }

        vectorDrawables.useSupportLibrary = true
    }

    signingConfigs {
        if (hasReleaseSigning) {
            release {
                keyAlias = keystoreProperties["keyAlias"]
                keyPassword = keystoreProperties["keyPassword"]
                storeFile = keystoreProperties["storeFile"] ? file(keystoreProperties["storeFile"]) : null
                storePassword = keystoreProperties["storePassword"]
            }
        }
    }

    buildTypes {
        debug {
            applicationIdSuffix ".debug"
            versionNameSuffix "-debug"
            debuggable true
            minifyEnabled false
            shrinkResources false
        }
        release {
            signingConfig hasReleaseSigning ? signingConfigs.release : signingConfigs.debug
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
        }
    }

    // Split APKs per ABI (smaller downloads) — release only
    splits {
        abi {
            enable project.hasProperty("split-per-abi")
            reset()
            include "armeabi-v7a", "arm64-v8a", "x86_64"
            universalApk true
        }
    }

    bundle {
        language { enableSplit = true }
        density  { enableSplit = true }
        abi      { enableSplit = true }
    }

    packagingOptions {
        resources {
            excludes += [
                "META-INF/LICENSE*",
                "META-INF/NOTICE*",
                "META-INF/AL2.0",
                "META-INF/LGPL2.1",
                "META-INF/*.kotlin_module"
            ]
        }
    }

    lint {
        checkReleaseBuilds = false
        abortOnError = false
    }
}

flutter {
    source = "../.."
}
