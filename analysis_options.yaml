include: package:flutter_lints/flutter.yaml

analyzer:
  exclude:
    - build/**
    - "**/*.g.dart"
    - "**/*.freezed.dart"
  errors:
    invalid_annotation_target: ignore
    deprecated_member_use: ignore
    invalid_assignment: warning
    argument_type_not_assignable: warning
    # Non-critical style issues — don't block CI
    prefer_const_constructors: warning
    prefer_const_declarations: warning
    prefer_const_literals_to_create_immutables: warning
    prefer_const_constructors_in_immutables: warning
    constant_identifier_names: ignore
    unnecessary_import: ignore
    unused_local_variable: warning
    dangling_library_doc_comments: ignore

linter:
  rules:
    avoid_print: true
    prefer_const_constructors: true
    prefer_const_constructors_in_immutables: true
    prefer_const_declarations: true
    prefer_const_literals_to_create_immutables: true
    use_key_in_widget_constructors: true
